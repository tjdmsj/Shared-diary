<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>My Space</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Apple SD Gothic Neo",
    "Pretendard",
    sans-serif;
    overflow:hidden;
}

.page{
    width:100vw;
    height:100vh;
    display:none;
    padding:24px;
}

.page.active{
    display:block;
}

#diary{
    background:#FFF4F7;
}

#fun{
    background:#F4F9FF;
}

#message{
    background:#FFFBEF;
}

.page h1{
    font-size:24px;
    font-weight:600;
}

.fab{
    position:fixed;
    right:24px;
    bottom:34px;
    width:56px;
    height:56px;
    border-radius:999px;
    border:none;
    background:#000;
    color:#fff;
    font-size:32px;
    cursor:pointer;
    z-index:1000;
}

.menu{
    position:fixed;
    right:24px;
    bottom:100px;
    display:flex;
    flex-direction:column;
    gap:10px;
    opacity:0;
    pointer-events:none;
    transition:0.2s;
}

.menu.show{
    opacity:1;
    pointer-events:auto;
}

.menu button{
    background:#fff;
    border:1px solid #000;
    border-radius:16px;
    padding:12px 16px;
    font-size:15px;
    text-align:left;
    cursor:pointer;
}

.menu button:active{
    opacity:0.7;
}
</style>
</head>

<body>

<section id="diary" class="page active">
    <h1>일기장</h1>
</section>

<section id="fun" class="page">
    <h1>재밌겠다</h1>
</section>

<section id="message" class="page">
    <h1>메세지 보내기</h1>
</section>

<div class="menu" id="menu">
    <button onclick="changePage('diary')">
        일기장
    </button>

    <button onclick="changePage('fun')">
        재밌겠다
    </button>

    <button onclick="changePage('message')">
        메세지 보내기
    </button>
</div>

<button class="fab" id="fab">
    +
</button>

<script>
const fab = document.getElementById('fab');
const menu = document.getElementById('menu');

fab.addEventListener('click', () => {
    menu.classList.toggle('show');
});

function changePage(pageId){

    document
    .querySelectorAll('.page')
    .forEach(page=>{
        page.classList.remove('active');
    });

    document
    .getElementById(pageId)
    .classList.add('active');

    menu.classList.remove('show');
}
</script>

</body>
</html>
