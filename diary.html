<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일기장</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:-apple-system,sans-serif;
background:#FFF4F7;
min-height:100vh;
padding:24px;
}
h1{font-size:24px;}

.fab{
position:fixed;
right:24px;
bottom:34px;
width:56px;
height:56px;
border:none;
border-radius:999px;
background:#000;
color:#fff;
font-size:32px;
}

.menu{
position:fixed;
right:24px;
bottom:100px;
display:flex;
flex-direction:column;
gap:10px;
opacity:0;
pointer-events:none;
transition:.2s;
}

.menu.show{
opacity:1;
pointer-events:auto;
}

.menu a{
text-decoration:none;
color:#000;
background:#fff;
border:1px solid #000;
border-radius:16px;
padding:12px 16px;
}

.menu a.active{
background:#000;
color:#fff;
}
</style>
</head>

<body>

<h1>일기장</h1>

<div class="menu" id="menu">
<a href="index.html">홈</a>
<a href="diary.html" class="active">일기장</a>
<a href="fun.html">재밌겠다</a>
<a href="message.html">메세지 보내기</a>
</div>

<button class="fab" id="fab">+</button>

<script>
const fab=document.getElementById("fab");
const menu=document.getElementById("menu");

fab.addEventListener("click",()=>{
menu.classList.toggle("show");
});
</script>

</body>
</html>
